name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-test-build:
    name: Validate, Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: barbershop_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d barbershop_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/barbershop_ci
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      GITHUB_ID: ci-github-id
      GITHUB_SECRET: ci-github-secret
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      DISCORD_CLIENT_ID: ci-discord-client-id
      DISCORD_CLIENT_SECRET: ci-discord-client-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations (CI database)
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint:check

      - name: Type check
        run: npm run type-check

      - name: Unit tests (CI)
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore
